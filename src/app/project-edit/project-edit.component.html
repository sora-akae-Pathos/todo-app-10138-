<header>
  <button class="delete-button" (click)="deleteProject()" [disabled]="loadingState === 'deleting' || loadingState === 'saving'">削除</button>
</header>
<body>
<div class="project-edit-container">
  <form [formGroup]="project_edit_form" (ngSubmit)="editProject()" autocomplete="off">
    <label>プロジェクト名</label>
    <input type="text" placeholder="30文字以内" formControlName="name">
    <label>合言葉</label>
    <input type="text" placeholder="4文字以上15文字以内" formControlName="phrase">
    <div class="button-container">
    <button type="submit" [disabled]="project_edit_form.invalid || loadingState === 'saving' || loadingState === 'deleting'">保存</button>
    <button type="button" (click)="onCancel()" [disabled]="loadingState === 'saving' || loadingState === 'deleting'">キャンセル</button>
    </div>
  </form>
</div>
<div *ngIf="loadingState === 'saving'" class="loading-overlay">
  <div class="loading">プロジェクトを更新しています...</div>
</div>
<div *ngIf="loadingState === 'deleting'" class="loading-overlay">
  <div class="loading">プロジェクトを削除しています...</div>
</div>
</body>
